<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml"
      th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Grant Course Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section class="container mt-4 py-5">

    <!-- USER SEARCH -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/admin/purchases}" method="get" class="row g-3">
                <div class="col-md-9">
                    <label class="form-label fw-semibold">Search User (Email / Phone)</label>
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="email@example.com or 98XXXXXXXX"
                           th:value="${keyword}"
                           required>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100">Search User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- USER NOT FOUND -->
    <div th:if="${keyword != null and user == null}"
         class="alert alert-warning text-center">
        No user found with provided Email or Phone.
    </div>

    <!-- PURCHASE FORM -->
    <div th:if="${user != null}" class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/purchases/update}" method="post" class="row g-3">

                <input type="hidden" name="userId" th:value="${user.id}">
                <input type="hidden" name="subjectId" id="selectedSubjectId">

                <!-- USER INFO -->
                <div class="col-md-4">
                    <label>User ID</label>
                    <input class="form-control" th:value="${user.id}" readonly>
                </div>

                <div class="col-md-4">
                    <label>Name</label>
                    <input class="form-control" th:value="${user.name}" readonly>
                </div>

                <div class="col-md-4">
                    <label>Email</label>
                    <input class="form-control" th:value="${user.emailId}" readonly>
                </div>

                <!-- SUBJECT SEARCH -->
                <div class="col-md-12 position-relative">
                  <label class="form-label fw-bold">Search & Select Subject</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-book"></i></span>
                            <input type="text" id="subjectInput" class="form-control" autocomplete="off" placeholder="Type subject name (e.g. Chemistry)...">
                        </div>
                        
                        <div id="searchResults" class="list-group position-absolute w-100 shadow-lg d-none" style="z-index: 1050; max-height: 250px; overflow-y: auto;">
                            </div>

                        <input type="hidden" name="courseId" id="selectedCourseId">
                        
                        <div id="selectionBadge" class="mt-2 d-none">
                            <span class="badge bg-success p-2">
                                Selected: <span id="selectedNameText">None</span>
                            </span>
                        </div>
                </div>

                <!-- DAYS -->
                <div class="col-md-6">
                    <label>Total Days</label>
                    <input type="number" name="days" class="form-control" required>
                </div>

                <!-- WHO ACTIVATED -->
                <div class="col-md-6">
                    <label>Who Activated</label>
                    <input type="text" name="whoActivated" class="form-control" required>
                </div>

                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-success" onclick="return validateForm()">Update Purchase</button>
                </div>

            </form>
        </div>
    </div>


<script>
    const subjectInput = document.getElementById('subjectInput');
    const searchResults = document.getElementById('searchResults');
    const selectedIdField = document.getElementById('selectedCourseId');
    const selectionBadge = document.getElementById('selectionBadge');
    const selectedNameText = document.getElementById('selectedNameText');

    let debounceTimer;

    subjectInput.addEventListener('input', function() {
        const query = this.value;

        clearTimeout(debounceTimer);

        if (query.length < 2) {
            searchResults.classList.add('d-none');
            return;
        }

        debounceTimer = setTimeout(() => {
            axios.get(`/api/courses/search?q=${query}`)
                .then(response => {
                    const data = response.data;
                    searchResults.innerHTML = '';

                    if (data && data.length > 0) {
                        searchResults.classList.remove('d-none');
                        data.forEach(item => {
                            const btn = document.createElement('button');
                            btn.type = 'button';
                            btn.className = 'list-group-item list-group-item-action py-2';
                            
                            // CORRECTED: Using 'subjectName' and 'categoryName' from your JSON
                            btn.innerHTML = `
                                <div class="d-flex justify-content-between align-items-center">
                                    <strong>${item.subjectName}</strong>
                                    <span class="badge bg-light text-dark border">${item.categoryName}</span>
                                </div>
                            `;
                            
                            btn.onclick = () => {
                                // CORRECTED: Using 'subjectId' and 'subjectName' from your JSON
                                selectSubject(item.subjectId, item.subjectName);
                            };
                            searchResults.appendChild(btn);
                        });
                    } else {
                        searchResults.classList.add('d-none');
                    }
                })
                .catch(err => {
                    console.error("Search error:", err);
                    searchResults.classList.add('d-none');
                });
        }, 300);
    });

    function selectSubject(id, name) {
        // This sets the value that the @RequestParam("courseId") expects
        selectedIdField.value = id;
        
        selectedNameText.innerText = name;
        subjectInput.value = name; 
        
        searchResults.classList.add('d-none');
        selectionBadge.classList.remove('d-none');
    }

    document.addEventListener('click', (e) => {
        if (!subjectInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.classList.add('d-none');
        }
    });
</script>
</section>
</body>
</html>
