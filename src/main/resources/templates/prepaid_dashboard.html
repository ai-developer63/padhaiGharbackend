<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal</title>
</head>
<body>
<section class="container py-5 mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-0">Partner Portal</h2>
            <p class="text-muted small">Welcome back, <span th:text="${seller.name}"></span></p>
        </div>
        <span class="badge bg-success rounded-pill px-3 py-2 fs-6 shadow-sm">
            <i class="fa-solid fa-wallet"></i> Balance: Rs. <span th:text="${seller.walletBalance}"></span>
        </span>
    </div>

    <div th:if="${succMsg}" class="alert alert-success text-center fw-bold shadow-sm" th:text="${succMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger text-center fw-bold shadow-sm" th:text="${errorMsg}"></div>

    <div class="row g-4 mb-5">
        <div class="col-lg-5">
            <div class="card shadow-lg border-0 h-100 rounded-4">
                <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-cart-shopping"></i> Sell Course Access</h5>
                </div>
                <div class="card-body p-4 bg-light">
                    <form th:action="@{/prepaid/sell}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small text-uppercase">Student Account</label>
                            <input type="text" name="userEmailOrPhone" class="form-control form-control-lg" placeholder="Student Email or Phone" required>
                        </div>

                        <div class="mb-3 position-relative">
                            <label class="form-label fw-bold text-muted small text-uppercase">Search Subject</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass text-primary"></i></span>
                                <input type="text" id="subjectInput" class="form-control form-control-lg" autocomplete="off" placeholder="Type subject name..." required>
                            </div>
                            
                            <div id="searchResults" class="list-group position-absolute w-100 shadow-lg d-none" style="z-index: 1050; max-height: 250px; overflow-y: auto;"></div>
                            
                            <input type="hidden" name="courseId" id="selectedCourseId" required>
                            
                            <div id="selectionBadge" class="mt-2 d-none">
                                <span class="badge bg-success p-2 w-100 text-start fs-6">
                                    <i class="fa-solid fa-check-circle"></i> Selected: <span id="selectedNameText">None</span>
                                </span>
                            </div>
                        </div>

                        <div class="row g-2 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small text-uppercase">Duration</label>
                                <div class="input-group">
                                    <input type="number" name="days" class="form-control form-control-lg" value="365" required>
                                    <span class="input-group-text bg-white">Days</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small text-uppercase">Promo Code</label>
                                <input type="text" name="couponCode" class="form-control form-control-lg" placeholder="Optional" style="text-transform: uppercase;">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" onclick="return confirm('Confirm sale? Your wallet will be deducted immediately.');">
                            <i class="fa-solid fa-check-circle"></i> Complete Sale
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card shadow-sm border-0 h-100 rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-dark border-bottom pb-3 mb-3"><i class="fa-solid fa-clock-rotate-left text-primary"></i> My Recent Sales</h5>
                    
                    <div class="table-responsive" style="min-height: 250px;">
                        <table class="table table-hover align-middle">
                            <thead class="bg-white sticky-top">
                                <tr class="text-muted small text-uppercase">
                                    <th>Date</th>
                                    <th>Subject</th>
                                    <th>Student</th>
                                    <th class="text-end">My Comm.</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="sale : ${salesPage.content}" th:classappend="${sale.isReversed} ? 'text-decoration-line-through text-muted' : ''">
                                    <td class="small" th:text="${#temporals.format(sale.createdAt, 'dd MMM yyyy')}"></td>
                                    <td>
                                        <div class="fw-bold" th:text="${sale.subjectName}"></div>
                                    </td>
                                    <td th:text="${sale.buyerName}"></td>
                                    <td class="text-end fw-bold text-success">
                                        <span th:if="${sale.isReversed}" class="badge bg-danger-subtle text-danger border border-danger">Reversed</span>
                                        <span th:if="${!sale.isReversed}">Rs. <span th:text="${sale.sellerCut}"></span></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <nav th:if="${salesPage.totalPages > 1}" aria-label="Page navigation" class="mt-3 border-top pt-3">
                        <ul class="pagination pagination-sm justify-content-end mb-0">
                            <li class="page-item" th:classappend="${salesPage.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{''(page=${salesPage.number - 1})}">Prev</a>
                            </li>
                            <li class="page-item disabled">
                                <span class="page-link text-dark">Page <span th:text="${salesPage.number + 1}"></span> of <span th:text="${salesPage.totalPages}"></span></span>
                            </li>
                            <li class="page-item" th:classappend="${salesPage.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{''(page=${salesPage.number + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const subjectInput = document.getElementById('subjectInput');
            const searchResults = document.getElementById('searchResults');
            const selectedIdField = document.getElementById('selectedCourseId');
            const selectionBadge = document.getElementById('selectionBadge');
            const selectedNameText = document.getElementById('selectedNameText');
            let debounceTimer;

            if(!subjectInput) return;

            subjectInput.addEventListener('input', function() {
                const query = this.value;
                clearTimeout(debounceTimer);

                if (query.length < 2) {
                    searchResults.classList.add('d-none');
                    return;
                }

                debounceTimer = setTimeout(() => {
                    axios.get(`/search/courses?q=${encodeURIComponent(query)}`)
                        .then(response => {
                            const data = response.data;
                            searchResults.innerHTML = '';

                            if (data && data.length > 0) {
                                searchResults.classList.remove('d-none');
                                data.forEach(item => {
                                    const btn = document.createElement('button');
                                    btn.type = 'button';
                                    btn.className = 'list-group-item list-group-item-action py-2';
                                    btn.innerHTML = `
                                        <div class="d-flex justify-content-between align-items-center">
                                            <strong>${item.subjectName}</strong>
                                            <span class="badge bg-light text-dark border">${item.categoryName || 'Course'}</span>
                                        </div>
                                    `;
                                    btn.onclick = () => { selectSubject(item.subjectId, item.subjectName); };
                                    searchResults.appendChild(btn);
                                });
                            } else {
                                searchResults.classList.add('d-none');
                            }
                        })
                        .catch(err => console.error("Search error:", err));
                }, 300);
            });

            window.selectSubject = function(id, name) {
                selectedIdField.value = id;
                selectedNameText.innerText = name;
                subjectInput.value = name; 
                searchResults.classList.add('d-none');
                if(selectionBadge) selectionBadge.classList.remove('d-none');
            };

            document.addEventListener('click', (e) => {
                if (subjectInput && !subjectInput.contains(e.target) && searchResults && !searchResults.contains(e.target)) {
                    searchResults.classList.add('d-none');
                }
            });
        });
    </script>
</section>
</body>
</html>
